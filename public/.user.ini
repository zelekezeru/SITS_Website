; Allow very large Secure Digital Archive (PDF) uploads.
; post_max_size = 0 disables the POST body limit entirely; upload_max_filesize
; still needs a concrete ceiling, so it is set high. Adjust to taste.
; NOTE: on cPanel this is picked up by PHP-FPM/FastCGI and cached for up to
; user_ini.cache_ttl (default 300s). If it does not take effect, set the same
; values in cPanel → MultiPHP INI Editor, and raise the web-server body limit
; (LiteSpeed/Apache LimitRequestBody, or nginx client_max_body_size).
upload_max_filesize = 5120M
post_max_size = 0
max_execution_time = 0
max_input_time = -1
memory_limit = 512M
